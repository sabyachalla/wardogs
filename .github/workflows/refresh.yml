name: Refresh War Dogs Signals

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run refresh script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python refresh.py

      - name: Commit updated events.json
        run: |
          git config user.name  "War Dogs Bot"
          git config user.email "bot@wardogs.app"
          git add events.json
          git diff --staged --quiet || git commit -m "chore: refresh signals $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Push changes
        run: git push
